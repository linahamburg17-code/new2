  .g1{width:64vw;height:64vw;left:-20vw;top:-10vw;background:radial-gradient(circle,var(--magenta),transparent 64%);opacity:.6;animation:drift1 18s ease-in-out infinite;}
  .g2{width:58vw;height:58vw;right:-22vw;top:6vh;background:radial-gradient(circle,#5b2bd6,transparent 64%);opacity:.6;animation:drift2 22s ease-in-out infinite;}
  .g3{width:72vw;height:72vw;left:-8vw;bottom:-32vh;background:radial-gradient(circle,var(--pink),transparent 60%);opacity:.4;animation:drift1 26s ease-in-out infinite reverse;}
  .g4{width:60vw;height:60vw;right:-12vw;bottom:-28vh;background:radial-gradient(circle,var(--cyan),transparent 62%);opacity:.22;animation:drift2 24s ease-in-out infinite;}

  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-7vw,4vh) scale(1.08);}}
  .particles{position:fixed;inset:0;z-index:1;pointer-events:none;}
  .pt{position:absolute;border-radius:50%;background:radial-gradient(circle,#fff,transparent 70%);opacity:.5;animation:float linear infinite;}

    align-items:center;padding:22px 22px 30px;gap:22px;}

  .brand-wrap{display:flex;align-items:center;gap:10px;min-width:0;}
  .mono{width:34px;height:34px;flex:none;}
  .brand{font-family:'Playfair Display',serif;font-size:16px;letter-spacing:.2px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lang{display:flex;flex:none;border:1px solid var(--glass-line);border-radius:30px;overflow:hidden;
    background:var(--glass);backdrop-filter:blur(6px);}
  .lang button{padding:7px 13px;font-size:12px;font-weight:700;color:var(--faint);background:none;border:none;
    cursor:pointer;font-family:'Manrope',sans-serif;letter-spacing:.05em;transition:color .2s;}
  .lang button.on{color:#1a0a2e;background:linear-gradient(100deg,#f7dca6,#ffc8ef 60%,#c8a4ff);
    box-shadow:0 0 16px rgba(198,75,255,.4);}

  .intro{text-align:center;max-width:340px;display:flex;flex-direction:column;gap:10px;}
  .eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:600;}

  .lead{font-size:14.5px;line-height:1.6;color:#ddd0f3;text-shadow:0 1px 14px rgba(12,5,24,.7);}

  .deco.d1{transform:translate(14px,16px) rotate(6deg);opacity:.5;}
  .deco.d2{transform:translate(7px,9px) rotate(3deg);opacity:.7;}

  .riser{position:absolute;inset:0;cursor:pointer;}
  .riser.lift{animation:lift 1s cubic-bezier(.22,1,.36,1);}
  @keyframes lift{0%{transform:translateY(0) scale(1);}45%{transform:translateY(-24px) scale(1.05);}100%{transform:translateY(0) scale(1);}}
  .cardbox{position:absolute;inset:0;}

    align-items:center;justify-content:center;}

    letter-spacing:.36em;text-transform:uppercase;color:var(--gold);opacity:.85;z-index:3;}

  /* front */
  .front{display:none;
    background:
      radial-gradient(130% 100% at 50% 0%,rgba(198,75,255,.30),transparent 55%),

  .glyph{width:42px;height:42px;position:relative;z-index:2;}
  .q{font-family:'Playfair Display',serif;font-weight:500;font-size:clamp(17px,4.7vw,21px);line-height:1.42;

  .frule{width:46px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
    position:relative;z-index:2;}

  /* ---------- actions ---------- */
  .actions{display:flex;flex-direction:column;gap:12px;width:100%;max-width:330px;align-items:center;}
  .btn{font-family:'Manrope',sans-serif;font-weight:700;font-size:15px;border:none;cursor:pointer;width:100%;

  footer a{font-size:12px;color:var(--faint);text-decoration:none;}
  footer a:hover{color:var(--muted);}

  /* ---------- sacred-geometry SVG ---------- */
  const NS_W=244,NS_H=366,CX=122,CY=183;
  function pol(cx,cy,r,n,rot){let p=[];for(let i=0;i<n;i++){const a=rot+i*2*Math.PI/n;p.push((cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1));}return p.join(" ");}
  function fol(cx,cy,r,full,cls){
    const c=[[0,0]];
    for(let i=0;i<6;i++){const a=i*Math.PI/3;c.push([r*Math.cos(a),r*Math.sin(a)]);}
    if(full){
      for(let i=0;i<6;i++){const a=i*Math.PI/3;c.push([2*r*Math.cos(a),2*r*Math.sin(a)]);}
      const r3=r*Math.sqrt(3);
      for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;c.push([r3*Math.cos(a),r3*Math.sin(a)]);}
    }
    return c.map(p=>`<circle cx="${(cx+p[0]).toFixed(1)}" cy="${(cy+p[1]).toFixed(1)}" r="${r}" class="${cls}"/>`).join("");
  }

  function backSVG(){
    let g="";
    g+=fol(CX,CY,30,true,"ln thin");
    g+=fol(CX,CY,30,false,"acc glowcy");
    g+=`<circle cx="${CX}" cy="${CY}" r="60" class="acc mag" style="opacity:.45"/>`;
    g+=`<circle cx="${CX}" cy="${CY}" r="100" class="ln thin"/>`;
    g+=`<circle cx="${CX}" cy="${CY}" r="110" class="ln thin"/>`;
    g+=`<polygon points="${pol(CX,CY,100,12,0)}" class="ln dim"/>`;
    for(let i=0;i<12;i++){const a=i*Math.PI/6;g+=`<circle cx="${(CX+Math.cos(a)*110).toFixed(1)}" cy="${(CY+Math.sin(a)*110).toFixed(1)}" r="1.8" class="dot"/>`;}
    const m=22,L=28;[[m,m,1,1],[NS_W-m,m,-1,1],[m,NS_H-m,1,-1],[NS_W-m,NS_H-m,-1,-1]].forEach(([x,y,sx,sy])=>{
      g+=`<path d="M ${x} ${y+sy*L} Q ${x} ${y} ${x+sx*L} ${y}" class="ln thin"/><circle cx="${x}" cy="${y}" r="1.6" class="dot"/>`;});
    g+=`<circle cx="${CX}" cy="${CY}" r="5" class="fillg glowsym"/>`;
    return g;
  }
  function frontOrnSVG(){
    return fol(CX,CY,34,true,"ln thin")+`<circle cx="${CX}" cy="${CY}" r="102" class="ln thin"/>`;
  }
  function glyphSVG(){
    const c=21;return fol(c,c,6,false,"acc glowcy")+`<circle cx="${c}" cy="${c}" r="2.4" class="fillg glowsym"/>`;
  }
  function monoSVG(){
    const c=17;let g=`<circle cx="${c}" cy="${c}" r="15.5" class="ln"/>`;
    g+=fol(c,c,5,false,"acc");
    g+=`<circle cx="${c}" cy="${c}" r="1.8" class="fillg"/>`;
    return g;
  }
  function wrap(inner,w,h){return inner;} // svg element already in DOM with viewBox

  // styles for svg strokes (injected)
  const styleTag=document.createElement('style');
  styleTag.textContent=`
    .ln{fill:none;stroke:var(--gold);stroke-width:1;opacity:.85;}
    .ln.dim{opacity:.42;} .ln.thin{stroke-width:.6;opacity:.5;}
    .acc{fill:none;stroke:var(--cyan);stroke-width:1;opacity:.78;} .acc.mag{stroke:var(--pink);}
    .dot{fill:var(--gold);opacity:.8;} .fillg{fill:var(--gold);}
    .glowsym{filter:drop-shadow(0 0 7px rgba(244,216,168,.9));}
    .glowcy{filter:drop-shadow(0 0 8px rgba(95,216,255,.8));}
    .glowmg{filter:drop-shadow(0 0 9px rgba(255,95,210,.85));}`;
  document.head.appendChild(styleTag);

  // inject SVGs
  document.getElementById('monoSvg').innerHTML=monoSVG();
  document.getElementById('glyph').innerHTML=glyphSVG();
  document.getElementById('frontOrn').innerHTML=frontOrnSVG();
  // back: insert svg before label
  const backFace=document.getElementById('backFace');
  const backSvgEl=document.createElementNS("http://www.w3.org/2000/svg","svg");
  backSvgEl.setAttribute("viewBox",`0 0 ${NS_W} ${NS_H}`);
  backSvgEl.setAttribute("class","face-bg");
  backSvgEl.innerHTML=backSVG();
  backFace.insertBefore(backSvgEl,backFace.firstChild);

  /* ---------- particles ---------- */
  (function(){const wrap=document.getElementById('particles');for(let i=0;i<16;i++){const p=document.createElement('div');p.className='pt';const s=2+Math.random()*4;p.style.width=p.style.height=s+'px';p.style.left=Math.random()*100+'vw';p.style.bottom='-10px';p.style.animationDuration=(13+Math.random()*16)+'s';p.style.animationDelay=(-Math.random()*20)+'s';wrap.appendChild(p);} })();

  /* ---------- i18n + logic ---------- */
  const M=window.MONEY;
  let lang=localStorage.getItem('mq_lang')||'ru';
  let idx=parseInt(localStorage.getItem('mq_idx')??'-1',10);
  let open=localStorage.getItem('mq_open')==='1';
  let last=idx;

  const el=id=>document.getElementById(id);
  const riser=el('riser'),cardbox=el('cardbox'),qEl=el('q'),drawBtn=el('drawBtn'),againBtn=el('againBtn');

  function applyLang(){
    const t=M[lang].ui;
    document.documentElement.lang=lang;
    el('brand').textContent=t.brand;
    el('eyebrow').textContent=t.eyebrow;
    el('title').innerHTML=t.title;
    el('lead').textContent=t.lead;
    drawBtn.textContent=t.draw;
    againBtn.textContent=t.again;
    el('tg').textContent=t.tg;
    el('instrTitle').textContent=t.instrTitle;
    el('instr1').textContent=t.instr1;
    el('instr2').textContent=t.instr2;
    el('backLabel').textContent=t.backLabel;
    if(open&&idx>=0) qEl.textContent=M[lang].cards[idx];
    [...el('lang').children].forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
  }

  function pickIdx(){let i;const n=M[lang].cards.length;do{i=Math.floor(Math.random()*n);}while(i===last&&n>1);last=i;return i;}

  function liftAndFlip(){
    riser.classList.remove('lift');void riser.offsetWidth;riser.classList.add('lift');
    cardbox.classList.remove('flip');void cardbox.offsetWidth;cardbox.classList.add('flip');
    setTimeout(()=>{ idx=pickIdx(); qEl.textContent=M[lang].cards[idx]; cardbox.classList.add('open');
      localStorage.setItem('mq_idx',idx);localStorage.setItem('mq_open','1'); },285);
    setTimeout(()=>{ riser.classList.remove('lift');cardbox.classList.remove('flip'); },1000);
  }
  function reveal(){ liftAndFlip(); drawBtn.classList.add('hidden'); againBtn.classList.remove('hidden'); open=true; }
  function cover(){
    riser.classList.remove('lift');void riser.offsetWidth;riser.classList.add('lift');
    cardbox.classList.remove('flip');void cardbox.offsetWidth;cardbox.classList.add('flip');
    setTimeout(()=>{ cardbox.classList.remove('open'); localStorage.setItem('mq_open','0'); },285);
    setTimeout(()=>{ riser.classList.remove('lift');cardbox.classList.remove('flip'); },1000);
    againBtn.classList.add('hidden'); drawBtn.classList.remove('hidden'); open=false;
  }

  drawBtn.addEventListener('click',reveal);
  againBtn.addEventListener('click',cover);
  riser.addEventListener('click',()=>{ if(!open) reveal(); });
  el('lang').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;lang=b.dataset.lang;localStorage.setItem('mq_lang',lang);applyLang();});

  // restore
  applyLang();
  if(open&&idx>=0){ cardbox.classList.add('open'); qEl.textContent=M[lang].cards[idx]; drawBtn.classList.add('hidden'); againBtn.classList.remove('hidden'); }
</script>
</body>
</html>
